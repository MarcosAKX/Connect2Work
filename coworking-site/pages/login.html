<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar · C2W Connect2Work</title>
  <meta name="description" content="Acesse sua conta C2W para agendar salas de coworking." />

  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/pages/login.css" />
</head>
<body>

  <main class="login-page">
    <canvas class="network-bg" id="network-bg" aria-hidden="true"></canvas>
    <div class="login-glow login-glow--top" aria-hidden="true"></div>
    <div class="login-glow login-glow--bottom" aria-hidden="true"></div>

    <div class="login-brand">
      <div class="login-logo">
        <span class="mark">Connect2<span>Work</span></span>
      </div>
      <p class="login-tagline">Seu espaço de trabalho, do seu jeito.</p>
    </div>

    <section class="login-card card" aria-labelledby="login-heading">
      <div class="login-card-header">
        <h1 id="login-heading">Entrar</h1>
        <p>Acesse sua conta para agendar salas</p>
      </div>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">E-mail ou usuário</label>
          <div class="field-input-wrap">
            <input
              type="text"
              id="email"
              name="email"
              placeholder="seu@email.com"
              autocomplete="username"
              maxlength="254"
              required
            />
          </div>
          <span class="field-error" id="email-error">Digite um e-mail válido.</span>
        </div>

        <div class="field">
          <label for="password">Senha</label>
          <div class="field-input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Sua senha"
              autocomplete="current-password"
              maxlength="128"
              required
            />
            <button
              type="button"
              class="toggle-visibility"
              id="toggle-password"
              aria-label="Mostrar senha"
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="field-error" id="password-error">Informe sua senha.</span>
        </div>

        <div class="field-meta-row">
          <a href="recuperar-senha.html" class="text-link forgot-link">Esqueci minha senha</a>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          <span class="btn-label">Entrar</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>

        <div class="divider">OU CONTINUE COM</div>

        <button type="button" class="btn btn-secondary" id="google-btn">
          <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.68-3.88 2.68-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.9v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.95 10.7A5.4 5.4 0 0 1 3.67 9c0-.59.1-1.17.28-1.7V4.97H.9A9 9 0 0 0 0 9c0 1.45.35 2.83.9 4.03l3.05-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58C13.46.89 11.43 0 9 0A9 9 0 0 0 .9 4.97l3.05 2.33C4.66 5.17 6.65 3.58 9 3.58z"/></svg>
          Entrar com Google
        </button>
      </form>

      <p class="login-footer">
        Não tem uma conta?
        <a href="cadastro.html" class="text-link">Cadastre-se</a>
      </p>


    </section>

  </main>

  <script type="module" src="../assets/js/pages/login.js"></script>
</body>
</html>
