<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar Senha · C2W Connect2Work</title>
  <meta name="description" content="Recupere o acesso à sua conta C2W Connect2Work." />

  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/pages/login.css" />
  <link rel="stylesheet" href="../assets/css/pages/recuperar-senha.css" />
</head>
<body>

  <main class="login-page recover-page">
    <canvas class="network-bg" id="network-bg" aria-hidden="true"></canvas>
    <div class="login-glow login-glow--top" aria-hidden="true"></div>
    <div class="login-glow login-glow--bottom" aria-hidden="true"></div>

    <div class="login-brand">
      <div class="login-logo">
        <span class="mark">Connect2<span>Work</span></span>
      </div>
      <p class="login-tagline">Recupere o acesso à sua conta</p>
    </div>

    <section class="login-card card recover-card" aria-labelledby="recover-heading">
      <div class="login-card-header">
        <h1 id="recover-heading">Recuperar Senha</h1>
        <p id="recover-subtitle">Informe seu e-mail para receber o link de redefinição</p>
      </div>

      <form id="recover-form" novalidate>
        <div class="field">
          <label for="email">E-mail</label>
          <div class="field-input-wrap">
            <input
              type="email"
              id="email"
              name="email"
              placeholder="seu@email.com"
              autocomplete="email"
              inputmode="email"
              maxlength="254"
              required
            />
          </div>
          <span class="field-error" id="email-error">Digite um e-mail válido.</span>
        </div>

        <button type="submit" class="btn btn-primary" id="submit-btn">
          <span class="btn-label">Enviar link</span>
          <span class="btn-spinner" aria-hidden="true"></span>
        </button>
      </form>

      <div class="recover-success" id="recover-success" hidden>
        <p class="recover-success-text" id="recover-success-text"></p>
        <a href="login.html" class="btn btn-secondary recover-success-btn">Voltar para login</a>
      </div>

      <a href="login.html" class="back-link" id="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        Voltar para login
      </a>
    </section>
  </main>

  <script type="module" src="../assets/js/pages/recuperar-senha.js"></script>
</body>
</html>
